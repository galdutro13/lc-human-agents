name: CI

on:
  push:
  pull_request:

jobs:
  local-gates:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run unit tests with coverage
        run: coverage run -m unittest discover -s source/tests/unittest -p 'test*.py'

      - name: Run local integration tests
        run: |
          coverage run -a -m unittest source.tests.integratio_test.persona_csv_integration
          coverage run -a -m unittest source.tests.integratio_test.test_v3_loader_pipeline_integration

      - name: Enforce coverage on simulation config
        run: coverage report --include='source/simulation_config/sampling.py,source/simulation_config/loader.py,source/simulation_config/validation.py' --fail-under=90

  live-integrations:
    runs-on: ubuntu-latest
    needs: local-gates
    env:
      PYTHONPATH: ${{ github.workspace }}
      PYTHONUNBUFFERED: "1"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run live workflow integration tests
        run: python -m unittest source.tests.integratio_test.workflow_integration_test
